<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いとのポートフォリオ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #425097;
      --primary-dark: #303a73;
      --primary-light: #5a6bbf;
      --text: #1a1a2e;
      --text-secondary: #555577;
      --bg: #f8f9ff;
      --bg-card: #ffffff;
      --border: #dde0f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ===== HEADER / HERO ===== */
    header {
      background: var(--primary);
      color: #fff;
      padding: 64px 24px 56px;
      text-align: center;
    }

    .hero-name {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .hero-tagline {
      font-size: 1.1rem;
      font-weight: 500;
      opacity: 0.9;
      margin-bottom: 28px;
      letter-spacing: 0.06em;
    }

    .hero-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 2px solid rgba(255,255,255,0.8);
      color: #fff;
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.15);
      border-color: #fff;
    }

    /* X (Twitter) icon */
    .icon-x {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ===== MAIN CONTENT ===== */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    section + section {
      margin-top: 64px;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 32px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 48px;
      height: 2px;
      background: var(--primary);
    }

    /* ===== WORKS GRID ===== */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .card:hover {
      box-shadow: 0 8px 24px rgba(66, 80, 151, 0.15);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #eef0fa;
      color: var(--primary);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .btn-primary {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--primary);
      color: rgba(255,255,255,0.85);
      text-align: center;
      padding: 36px 24px;
      margin-top: 80px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .footer-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: #fff;
    }

    .footer-copy {
      font-size: 0.85rem;
      opacity: 0.65;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .hero-name {
        font-size: 2.2rem;
      }

      .hero-tagline {
        font-size: 1rem;
      }

      main {
        padding: 40px 16px;
      }

      .works-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5618483325111588"
       crossorigin="anonymous"></script>
</head>
<body>

  <!-- HEADER / HERO -->
  <header>
    <p class="hero-name">いと</p>
    <p class="hero-tagline">AI × 〇〇</p>
    <div class="hero-links">
      <a class="btn-outline" href="https://x.com/ito_itoai" target="_blank" rel="noopener noreferrer">
        <svg class="icon-x" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        @ito_itoai
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- WORKS SECTION -->
    <section id="works">
      <h2 class="section-title">作品一覧</h2>
      <div class="works-grid">

        <!-- Card: ぷよリス -->
        <div class="card">
          <p class="card-title">ぷよリス</p>
          <p class="card-desc">広告で見たテトリスがプレイしたくて作りました。</p>
          <div class="card-tags">
            <span class="tag">ゲーム</span>
            <span class="tag">パズル</span>
          </div>
          <a class="btn-primary" href="https://umimuk.github.io/tetpuyo/tetpuyo.html" target="_blank" rel="noopener noreferrer">
            プレイする
          </a>
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <nav class="footer-links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Service</a>
      <a href="https://x.com/ito_itoai" target="_blank" rel="noopener noreferrer">Contact (@ito_itoai)</a>
    </nav>
    <p class="footer-copy">&copy; 2024 ito. All rights reserved.</p>
  </footer>

</body>
</html>
