<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いとのポートフォリオ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #a0e8ff;
      --primary-dark: #64b5f6;
      --text: #2c3e50;
      --text-secondary: #7f8c8d;
      --bg: #f5f9fc;
      --bg-card: #ffffff;
      --border: #d0eaf5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== HEADER / HERO ===== */
    header {
      background: linear-gradient(135deg, #a0e8ff 0%, #c8f2ff 100%);
      color: var(--text);
      padding: clamp(20px, 4vh, 52px) 24px clamp(18px, 3.5vh, 48px);
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* デフォルト：中〜大画面（1025px〜1919px） */
    .hero-logo {
      width: clamp(260px, 22vw, 320px);
      max-width: 90%;
      height: auto;
      display: block;
      margin: 0 auto clamp(14px, 2.5vh, 28px);
      animation: fadeIn 0.7s ease both;
    }

    .hero-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 2px solid rgba(44,62,80,0.4);
      color: var(--text);
      text-decoration: none;
      padding: clamp(6px, 0.8vh, 8px) 18px;
      border-radius: 24px;
      font-size: clamp(0.82rem, 1.1vw, 0.95rem);
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-outline:hover {
      background: rgba(44,62,80,0.08);
      border-color: rgba(44,62,80,0.7);
    }

    .icon-x {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    /* ===== MAIN CONTENT ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(20px, 4vh, 48px) clamp(16px, 3vw, 40px);
    }

    section + section {
      margin-top: clamp(28px, 4.5vh, 64px);
    }

    .section-title {
      font-size: clamp(1.05rem, 1.8vw, 1.4rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: clamp(14px, 2.2vh, 28px);
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 48px;
      height: 2px;
      background: var(--primary-dark);
    }

    /* ===== WORKS GRID ===== */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(12px, 1.5vw, 22px);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: clamp(14px, 2vh, 22px) clamp(14px, 1.5vw, 22px);
      display: flex;
      flex-direction: column;
      gap: clamp(7px, 1vh, 12px);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .card:hover {
      box-shadow: 0 6px 20px rgba(100, 181, 246, 0.2);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: clamp(0.95rem, 1.4vw, 1.15rem);
      font-weight: 700;
      color: var(--text);
    }

    .card-desc {
      font-size: clamp(0.8rem, 1.1vw, 0.9rem);
      color: var(--text-secondary);
      flex: 1;
      line-height: 1.6;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      background: #d8f3ff;
      color: var(--text);
      font-size: clamp(0.7rem, 0.9vw, 0.8rem);
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .btn-primary {
      display: inline-block;
      background: var(--primary);
      color: var(--text);
      text-decoration: none;
      padding: clamp(7px, 1vh, 10px) 20px;
      border-radius: 8px;
      font-size: clamp(0.82rem, 1.1vw, 0.95rem);
      font-weight: 500;
      text-align: center;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    /* ===== FOOTER ===== */
    footer {
      background: linear-gradient(135deg, #7dcef5 0%, #a0e8ff 100%);
      color: var(--text);
      text-align: center;
      padding: clamp(18px, 2.5vh, 32px) 24px;
      margin-top: clamp(20px, 3.5vh, 60px);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .footer-links a {
      color: var(--text);
      text-decoration: none;
      font-size: clamp(0.78rem, 1vw, 0.9rem);
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: #1a252f;
    }

    .footer-copy {
      font-size: clamp(0.72rem, 0.9vw, 0.82rem);
      opacity: 0.6;
    }

    /* ===== RESPONSIVE BREAKPOINTS ===== */

    /* 大画面 ≥1920px */
    @media (min-width: 1920px) {
      .hero-logo { width: 350px; }
      main { max-width: 1300px; }
    }

    /* タブレット 768px〜1024px：1列 */
    @media (max-width: 1024px) {
      .hero-logo { width: clamp(200px, 26vw, 250px); }
      .works-grid { grid-template-columns: 1fr; }
      main { max-width: 640px; }
    }

    /* スマホ ≤767px */
    @media (max-width: 767px) {
      .hero-logo { width: clamp(150px, 42vw, 200px); }
      main { padding: clamp(18px, 3vh, 28px) 16px; }
      .btn-outline { padding: 6px 14px; font-size: 0.85rem; }
      .card { padding: 14px 14px; gap: 8px; }
      .footer-links { gap: 14px; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5618483325111588"
       crossorigin="anonymous"></script>
</head>
<body>

  <!-- HEADER / HERO -->
  <header>
    <img class="hero-logo" src="logo-header.png" alt="ロゴ">
    <div class="hero-links">
      <a class="btn-outline" href="https://x.com/ito_itoai" target="_blank" rel="noopener noreferrer">
        <svg class="icon-x" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        @ito_itoai
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- WORKS SECTION -->
    <section id="works">
      <h2 class="section-title">作品一覧</h2>
      <div class="works-grid">
        <!-- Card: ぷよリス -->
        <div class="card">
          <p class="card-title">ぷよリス</p>
          <p class="card-desc">広告で見たテトリスがプレイしたくて作りました。</p>
          <div class="card-tags">
            <span class="tag">ゲーム</span>
            <span class="tag">パズル</span>
            <span class="tag">Claude Code</span>
          </div>
          <a class="btn-primary" href="https://umimuk.github.io/tetpuyo/tetpuyo.html" target="_blank" rel="noopener noreferrer">
            プレイする
          </a>
        </div>

        <!-- Card: ねこモグラ -->
        <div class="card">
          <p class="card-title">ねこモグラ</p>
          <p class="card-desc">
            月もので辛いときに３時間でつくりました。<br>
            30秒間で猫を叩いて高スコアを目指すゲーム。<br>
            難易度選択、ランキング機能付き。
          </p>
          <div class="card-tags">
            <span class="tag">ゲーム</span>
            <span class="tag">タイミング</span>
            <span class="tag">ChatGPT</span>
          </div>
          <a class="btn-primary" href="https://umimuk.github.io/neko-mogura/" target="_blank" rel="noopener noreferrer">
            プレイする
          </a>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <nav class="footer-links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Service</a>
      <a href="https://x.com/ito_itoai" target="_blank" rel="noopener noreferrer">Contact (@ito_itoai)</a>
    </nav>
    <p class="footer-copy">&copy; 2024 ito. All rights reserved.</p>
  </footer>

</body>
</html>
